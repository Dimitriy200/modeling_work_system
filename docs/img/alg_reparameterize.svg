<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="635px" preserveAspectRatio="none" style="width:352px;height:635px;background:#FFFFFF;" version="1.1" viewBox="0 0 352 635" width="352px" zoomAndPan="magnify"><title>&#1040;&#1083;&#1075;&#1086;&#1088;&#1080;&#1090;&#1084; &#1084;&#1077;&#1090;&#1086;&#1076;&#1072; reparameterize</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="268.4199" x="40.4277" y="32.9951">&#1040;&#1083;&#1075;&#1086;&#1088;&#1080;&#1090;&#1084; &#1084;&#1077;&#1090;&#1086;&#1076;&#1072; reparameterize</text></g><ellipse cx="163.6377" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="234.0781" x="46.5986" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.1699" x="56.5986" y="108.4355">&#1055;&#1086;&#1083;&#1091;&#1095;&#1077;&#1085;&#1080;&#1077; &#1074;&#1093;&#1086;&#1076;&#1085;&#1099;&#1093; &#1087;&#1072;&#1088;&#1072;&#1084;&#1077;&#1090;&#1088;&#1086;&#1074;:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="214.0781" x="56.5986" y="122.4043">- mu (&#1084;&#1072;&#1090;&#1077;&#1084;&#1072;&#1090;&#1080;&#1095;&#1077;&#1089;&#1082;&#1086;&#1077; &#1086;&#1078;&#1080;&#1076;&#1072;&#1085;&#1080;&#1077;)</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="199.9512" x="56.5986" y="136.373">- log_var (&#1083;&#1086;&#1075;&#1072;&#1088;&#1080;&#1092;&#1084; &#1076;&#1080;&#1089;&#1087;&#1077;&#1088;&#1089;&#1080;&#1080;)</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="305.2754" x="11" y="219.2148"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.7891" x="21" y="240.3535">&#1054;&#1075;&#1088;&#1072;&#1085;&#1080;&#1095;&#1077;&#1085;&#1080;&#1077; &#1076;&#1080;&#1072;&#1087;&#1072;&#1079;&#1086;&#1085;&#1072; log_var:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="285.2754" x="21" y="254.3223">log_var = clamp(log_var, min=-10.0, max=3.0)</text><polygon fill="#F1F1F1" points="91.512,169.2031,235.7634,169.2031,247.7634,182.0078,235.7634,194.8125,91.512,194.8125,79.512,182.0078,91.512,169.2031" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14.3462" x="167.6377" y="205.0229">&#1076;&#1072;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="144.2515" x="91.512" y="179.4136">&#1058;&#1088;&#1077;&#1073;&#1091;&#1077;&#1090;&#1089;&#1103; &#1089;&#1090;&#1072;&#1073;&#1080;&#1083;&#1080;&#1079;&#1072;&#1094;&#1080;&#1103;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="142.8442" x="91.512" y="192.2183">(&#1085;&#1072;&#1087;&#1088;&#1080;&#1084;&#1077;&#1088;, MambaSSM)?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="20.3672" x="247.7634" y="179.4136">&#1085;&#1077;&#1090;</text><polygon fill="#F1F1F1" points="163.6377,287.1523,175.6377,299.1523,163.6377,311.1523,151.6377,299.1523,163.6377,287.1523" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="271.5078" x="27.8838" y="331.1523"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251.5078" x="37.8838" y="352.291">&#1042;&#1099;&#1095;&#1080;&#1089;&#1083;&#1077;&#1085;&#1080;&#1077; &#1089;&#1090;&#1072;&#1085;&#1076;&#1072;&#1088;&#1090;&#1085;&#1086;&#1075;&#1086; &#1086;&#1090;&#1082;&#1083;&#1086;&#1085;&#1077;&#1085;&#1080;&#1103;:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.1172" x="37.8838" y="366.2598">std = exp(0.5 * log_var)</text><rect fill="#F1F1F1" height="61.9063" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="206.6914" x="60.292" y="399.0898"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.6914" x="70.292" y="420.2285">&#1043;&#1077;&#1085;&#1077;&#1088;&#1072;&#1094;&#1080;&#1103; &#1089;&#1083;&#1091;&#1095;&#1072;&#1081;&#1085;&#1086;&#1075;&#1086; &#1096;&#1091;&#1084;&#1072;:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="80.1211" x="70.292" y="434.1973">eps ~ N(0, I);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="137.5605" x="70.292" y="448.166">eps.shape = std.shape</text><rect fill="#F1F1F1" height="47.9375" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="250.2969" x="38.4893" y="480.9961"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.2969" x="48.4893" y="502.1348">&#1060;&#1086;&#1088;&#1084;&#1080;&#1088;&#1086;&#1074;&#1072;&#1085;&#1080;&#1077; &#1083;&#1072;&#1090;&#1077;&#1085;&#1090;&#1085;&#1086;&#1075;&#1086; &#1074;&#1077;&#1082;&#1090;&#1086;&#1088;&#1072;:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="123.7793" x="48.4893" y="516.1035">z = mu + (eps * std)</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="212.8027" x="57.2363" y="548.9336"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.8027" x="67.2363" y="5